name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. **Do not report security issues here** —
        see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including expected vs actual behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: .NET SDK version, OS, Docker version, and which component (Web / MCP / ExternalNode / AppHost).
      placeholder: |
        - .NET SDK: 10.0.100
        - OS: Windows 11 / Ubuntu 24.04
        - Docker: 27.x
        - Component: Web
    validations:
      required: true

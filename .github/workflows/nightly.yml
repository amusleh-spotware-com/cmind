name: Nightly (stress / DST)

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC daily
  workflow_dispatch: {}

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  stress:
    name: Deterministic stress suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet restore
      - name: Stress (DST)
        run: >
          dotnet test tests/StressTests --configuration Release
          --logger "trx;LogFileName=stress.trx"
          --results-directory TestResults
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-stress
          path: TestResults

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build:
    name: Build (0 warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release

  analyzer-sweep:
    name: Analyzer sweep (info CA/IDE)
    runs-on: ubuntu-latest
    if: false  # TEMP-ASPIRE-ONLY
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet restore
      - name: Analyzer sweep on changed C# files
        run: bash scripts/sweep.sh --changed origin/${{ github.base_ref || 'main' }}

  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    if: false  # TEMP-ASPIRE-ONLY
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet restore
      - name: Unit
        run: >
          dotnet test tests/UnitTests --configuration Release
          --logger "trx;LogFileName=unit.trx"
          --results-directory TestResults
          --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-unit
          path: TestResults

  test-integration:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    if: false  # TEMP-ASPIRE-ONLY
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet restore
      - name: Integration
        run: >
          dotnet test tests/IntegrationTests --configuration Release
          --logger "trx;LogFileName=integration.trx"
          --results-directory TestResults
          --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-integration
          path: TestResults

  test-aspire:
    name: Aspire smoke (AppHost)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet restore
      - name: Aspire smoke
        run: >
          dotnet test tests/AspireTests --configuration Release
          --logger "trx;LogFileName=aspire.trx"
          --results-directory TestResults
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-aspire
          path: TestResults

  test-e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    if: false  # TEMP-ASPIRE-ONLY
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet restore
      - name: Build E2E
        run: dotnet build tests/E2ETests --configuration Release --no-restore
      - name: Install Playwright browsers
        run: pwsh tests/E2ETests/bin/Release/net10.0/playwright.ps1 install --with-deps chromium
      - name: E2E
        run: >
          dotnet test tests/E2ETests --configuration Release --no-build
          --logger "trx;LogFileName=e2e.trx"
          --results-directory TestResults
          --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-e2e
          path: TestResults

  docs:
    name: Docs site (link check)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
        working-directory: website
      - name: Build (fails on broken links)
        run: npm run build
        working-directory: website

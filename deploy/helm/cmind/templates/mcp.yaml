apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cmind.fullname" . }}-mcp
  labels:
    {{- include "cmind.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  replicas: {{ .Values.mcp.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: mcp
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mcp
          image: "{{ include "cmind.image" . }}-mcp:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.mcp.port }}
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: "http://+:{{ .Values.mcp.port }}"
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cmind.secretName" . }}
                  key: PG_PASSWORD
            - name: ConnectionStrings__appdb
              value: {{ include "cmind.connectionString" . | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otlpEndpoint | quote }}
          livenessProbe:
            httpGet:
              path: /version
              port: {{ .Values.mcp.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /version
              port: {{ .Values.mcp.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.mcp.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cmind.fullname" . }}-mcp
  labels:
    {{- include "cmind.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: mcp
  ports:
    - name: http
      port: {{ .Values.mcp.port }}
      targetPort: {{ .Values.mcp.port }}
{{- if .Values.mcp.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "cmind.fullname" . }}-mcp
  labels:
    {{- include "cmind.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "cmind.fullname" . }}-mcp
  minReplicas: {{ .Values.mcp.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.mcp.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.mcp.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}

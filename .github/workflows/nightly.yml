name: Nightly (stress / DST)

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC daily
  workflow_dispatch: {}

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  stress:
    name: Deterministic stress suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet restore
      - name: Stress (DST)
        run: >
          dotnet test tests/StressTests --configuration Release
          --logger "trx;LogFileName=stress.trx"
          --results-directory TestResults
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-stress
          path: TestResults

  k8s-e2e:
    name: In-cluster E2E (Kind)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.25.0/kind-linux-amd64
          chmod +x ./kind && sudo mv ./kind /usr/local/bin/kind
      - uses: azure/setup-helm@v4
      - name: Verify whole app in-cluster (deterministic copy suite; no secrets)
        run: bash scripts/k8s-e2e.sh
        env:
          TEST_FILTER: FullyQualifiedName~CopyTrading
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: k8s-e2e-log
          path: /tmp/cmind-tests.log

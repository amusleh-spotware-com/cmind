## cmind Helm values.

image:
  registry: ghcr.io
  repository: your-org/cmind
  # Per-component tags default to Chart.appVersion; override per environment.
  tag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

## Secrets. In production, prefer an external Secret / sealed-secret / CSI provider and set
## existingSecret to its name; the keys below must exist in it.
secrets:
  existingSecret: ""
  pgPassword: "change-me"
  ownerEmail: "owner@example.com"
  ownerPassword: "Change-Me-Str0ng!"
  # Shared cluster secret agents present to self-register (>= 32 chars). Also each agent's JwtSecret.
  discoveryJoinToken: "change-me-to-a-32-char-min-cluster-secret"
  # Optional Data Protection cert (base64 PFX) + password for a stable key ring across replicas.
  dataProtectionCertBase64: ""
  dataProtectionCertPassword: ""

## Observability. Point at your OTLP collector to ship logs+traces+metrics.
observability:
  otlpEndpoint: ""

## In-cluster Postgres (dev/test). Disable and set externalDatabase for managed Postgres.
postgres:
  enabled: true
  image: postgres:17
  storage: 10Gi
  storageClass: ""

externalDatabase:
  # Used when postgres.enabled=false. Full Npgsql connection string (or leave blank and set via secret).
  connectionString: ""

web:
  replicas: 2
  port: 8080
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: "1", memory: 1Gi }
  # CBotBuilder + LocalNode need Docker. hostPath mounts the node's docker socket (nodes must run
  # Docker, not containerd). Disable if you offload all builds/runs to privileged node agents.
  dockerSocket:
    enabled: true
    path: /var/run/docker.sock
  localNodeEnabled: false
  ingress:
    enabled: false
    className: ""
    host: cmind.example.com
    tls: false
    annotations: {}
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

mcp:
  replicas: 1
  port: 8080
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 500m, memory: 512Mi }
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

## Self-registering node agents. Each pod boots, self-registers to the Web service, then
## heartbeats. Scale replicas for more run/backtest capacity.
nodeAgent:
  enabled: true
  replicas: 2
  port: 8080
  mode: Mixed
  maxInstances: 10
  heartbeatIntervalSeconds: 30
  allowedImagePrefix: "ghcr.io/spotware/"
  # Privileged so the agent can start its own in-pod dockerd (see ExternalNode Dockerfile).
  privileged: true
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: "2", memory: 2Gi }

copyAgent:
  # Standing per-node copy-trading agent (holds Open API sockets, mirrors trades). Disabled by
  # default; enable and set App:Copy:Enabled=false on the web host to move copy hosting here.
  enabled: false
  replicas: 1
  resources:
    requests: { cpu: 250m, memory: 256Mi }
    limits: { cpu: "1", memory: 1Gi }

discovery:
  enabled: true
  heartbeatTtl: "00:01:30"
  monitorInterval: "00:00:30"
  heartbeatInterval: "00:00:30"

## In-cluster test runner. Disabled by default; enable to run the copy-trading suite as a K8s Job
## against the deployed Postgres + Web using a mounted token cache. The copy tests need only
## Postgres + Web + the token cache (no privileged node agents).
tests:
  enabled: false
  # Which suite to run. Default = live copy suite; use "FullyQualifiedName~CopyTrading" for the
  # deterministic suite (no secrets/network needed).
  project: "tests/IntegrationTests/IntegrationTests.csproj"
  filter: "FullyQualifiedName~CopyTradingLiveTests"
  backoffLimit: 0
  # Name of the K8s Secret holding the gitignored openapi-*.local.json files (one key per file),
  # mounted at /app/secrets. Create with:
  #   kubectl create secret generic cmind-copy-secrets --from-file=secrets/
  copySecret: "cmind-copy-secrets"
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: "2", memory: 2Gi }
